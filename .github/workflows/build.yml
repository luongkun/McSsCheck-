name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions:
  contents: write   # needed for the release job to create / upload assets

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore McSsCheck.csproj

      - name: Build (Release)
        run: dotnet build McSsCheck.csproj -c Release --no-restore --warnaserror

      - name: Publish single-file win-x64
        run: dotnet publish McSsCheck.csproj -c Release -r win-x64 --self-contained true -o publish

      - name: Verify exe exists
        shell: pwsh
        run: |
          if (-not (Test-Path publish/McSsCheck.exe)) { throw "McSsCheck.exe missing" }
          Get-Item publish/McSsCheck.exe | Select-Object Name, Length, LastWriteTime

      - name: Compute SHA-256 (for release notes)
        id: hash
        shell: pwsh
        run: |
          $h = (Get-FileHash publish/McSsCheck.exe -Algorithm SHA256).Hash.ToLower()
          "sha256=$h" | Out-File -Append -FilePath $env:GITHUB_OUTPUT
          Write-Host "SHA256: $h"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: McSsCheck-win-x64
          path: publish/McSsCheck.exe
          if-no-files-found: error

      # --- Release step: only fires on v* tag push -----------------------
      # Publishes publish/McSsCheck.exe as a GitHub Release asset with the
      # tag name (e.g. `v0.9.5`). Extracts the matching section from
      # CHANGELOG.md for the release body when present.
      - name: Extract changelog section for this tag
        if: startsWith(github.ref, 'refs/tags/v')
        id: changelog
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          # v0.9.5 -> 0.9.5
          $ver = $tag.TrimStart('v')
          $path = "CHANGELOG.md"
          if (-not (Test-Path $path)) {
            "body=No CHANGELOG.md found." | Out-File -Append -FilePath $env:GITHUB_OUTPUT
            exit 0
          }
          $all = Get-Content $path -Raw
          # Grab everything from "## [<ver>]" up to the next top-level "## ["
          $pattern = "(?ms)^## \[" + [regex]::Escape($ver) + "\].*?(?=^## \[|\z)"
          $m = [regex]::Match($all, $pattern)
          if (-not $m.Success) {
            Write-Host "No matching CHANGELOG section for version $ver; falling back to a placeholder."
            $body = "Release $tag. See CHANGELOG.md for details."
          } else {
            $body = $m.Value.Trim()
          }
          # Append the binary's SHA-256 so staff can verify the exe.
          $body = $body + "`n`n---`n`n**McSsCheck.exe SHA-256:** ``${{ steps.hash.outputs.sha256 }}```n"
          # Write to a temp file + point $GITHUB_OUTPUT at it via the multi-line
          # delimiter syntax (GitHub-recommended for bodies with newlines).
          $delim = "MCSSCHECK_RELEASE_BODY_" + [guid]::NewGuid().ToString("N")
          "body<<$delim" | Out-File -Append -FilePath $env:GITHUB_OUTPUT
          $body | Out-File -Append -FilePath $env:GITHUB_OUTPUT
          "$delim"      | Out-File -Append -FilePath $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: McSsCheck ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.body }}
          files: publish/McSsCheck.exe
          fail_on_unmatched_files: true
